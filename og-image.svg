<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Vyzivne.cz</title>
  <desc id="desc">Klidná orientační kalkulačka výživného pro rodiče v Česku</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2F8F6"></stop>
      <stop offset="100%" stop-color="#EDF2F8"></stop>
    </linearGradient>
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DAEA4"></stop>
      <stop offset="100%" stop-color="#6F89A8"></stop>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"></rect>
  <rect x="84" y="84" width="130" height="130" rx="30" fill="url(#mark)"></rect>
  <path d="M116 128L149 173L182 128" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"></path>
  <text x="246" y="145" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="54" font-weight="800" fill="#2F4F65">VYZIVNE.CZ</text>
